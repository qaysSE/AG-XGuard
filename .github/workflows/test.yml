name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with all extras
        run: pip install -e ".[all]"

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio pytest-cov

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=agx --cov-report=term-missing --cov-fail-under=80

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check agx/ --select E,F,W --ignore E501

      - name: Ruff format check
        run: ruff format agx/ --check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and mypy
        run: pip install -e ".[all]" mypy types-pyyaml

      - name: Run mypy
        run: mypy agx/ --ignore-missing-imports
