<!DOCTYPE html>
<html lang="en" x-data="{ sidebarOpen: false }">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AG-X Dashboard{% endblock %}</title>
  <link rel="icon" type="image/jpeg" href="/static/logo.jpeg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    /* Keep semantic status colours; everything else is black & white */
    .outcome-SUCCESS { background:#dcfce7; color:#166534; }
    .outcome-FAILURE { background:#fee2e2; color:#991b1b; }
    .outcome-BLOCKED { background:#ffedd5; color:#9a3412; }
    .outcome-WARNED  { background:#fef9c3; color:#854d0e; }
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:#f1f1f1; }
    ::-webkit-scrollbar-thumb { background:#ccc; border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background:#999; }
  </style>
</head>
<body class="min-h-screen font-sans antialiased bg-gray-50 text-gray-900">

<!-- Cloud banner -->
{% if cloud_banner %}
<div class="bg-gray-900 text-white text-center text-sm py-1.5 px-4 font-medium">
  ☁ {{ cloud_banner }}
</div>
{% endif %}

<!-- Nav -->
<nav class="bg-white border-b border-gray-200">
  <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-14">
    <a href="/" class="flex items-center gap-2.5">
      <img src="/static/logo.jpeg" alt="AG-X" class="h-8 w-8 rounded-md object-cover" />
      <span class="font-bold text-base tracking-tight text-gray-900">AG-X</span>
    </a>
    <div class="flex items-center gap-6 text-sm font-medium text-gray-700">
      <a href="/"         class="hover:text-black transition-colors">Runs</a>
      <a href="/vaccines" class="hover:text-black transition-colors">Vaccines</a>
      <a href="/scanner"  class="hover:text-black transition-colors">Scanner</a>
      {% if not cloud_banner %}
      <a href="https://ag-x.dev/" target="_blank"
         class="bg-gray-900 text-white text-xs px-3 py-1.5 rounded-md hover:bg-black transition-colors">
        Upgrade &rarr;
      </a>
      {% endif %}
    </div>
  </div>
</nav>

<!-- Main -->
<main class="max-w-7xl mx-auto px-4 py-8">
  {% block content %}{% endblock %}
</main>

<!-- Footer -->
<footer class="border-t border-gray-200 mt-16 py-6 text-center text-xs text-gray-400">
  AG-X Edition &mdash; Apache 2.0 &mdash;
  <a href="https://ag-x.dev" class="underline hover:text-gray-600">AG-X</a>
</footer>

{% block scripts %}{% endblock %}
</body>
</html>
